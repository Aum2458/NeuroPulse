<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | NeuroPulse-MDx+</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-green-100 to-emerald-200 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-96">

    <h1 class="text-3xl font-bold text-green-700 text-center mb-2">
      🧠 NeuroPulse-MDx+
    </h1>
    <p class="text-center text-gray-600 mb-6">
      Create Your Account
    </p>

    {% if error %}
      <p class="text-red-500 mb-4 text-center">{{ error }}</p>
    {% endif %}

    <form method="POST" class="space-y-4">

      <input type="text" name="username" placeholder="Username" required
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">

      <input type="password" name="password" placeholder="Password" required
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">

      <button type="submit"
        class="w-full bg-green-600 text-white py-2 rounded-lg text-lg hover:bg-green-700 transition">
        📝 Register
      </button>

    </form>

    <p class="mt-5 text-center text-gray-600">
      Already have an account?
      <a href="{{ url_for('login') }}" class="text-indigo-600 font-semibold hover:underline">
        Login
      </a>
    </p>

  </div>

</body>
</html>
