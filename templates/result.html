<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Result | NeuroPulse-MDx+</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 min-h-screen flex flex-col items-center pt-10">

  <h1 class="text-3xl font-bold text-indigo-600 mb-6">
    ✅ Diagnosis Results | NeuroPulse-MDx+
  </h1>

  <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-md w-96 space-y-4 text-gray-800 dark:text-gray-200">

    <!-- ✅ FIXED -->
    <div class="border-b pb-2">
      <p class="font-semibold">🦠 Symptoms</p>
      <p class="text-gray-600 dark:text-gray-300">
        {{ result.symptoms }}
      </p>
    </div>

    <div class="border-b pb-2">
      <p class="font-semibold">🧪 Risk Level</p>
      <p>
        {{ result.risk_level }} 
        <span class="text-sm text-gray-500">
          (Score: {{ result.risk_score }})
        </span>
      </p>
    </div>

    <div class="border-b pb-2">
      <p class="font-semibold">📡 Suggested Action</p>
      <p class="text-indigo-600 font-medium">
        {{ result.action }}
      </p>
    </div>

    <!-- ❌ REMOVED medicine (not in backend) -->

    <div>
      <p class="font-semibold">💡 AI Explanation</p>
      <p class="text-sm leading-relaxed text-gray-600 dark:text-gray-300">
        {{ result.ai_explanation }}
      </p>
    </div>

  </div>

  <a href="{{ url_for('analyze') }}"
     class="mt-6 bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 transition">
    🔄 Analyze Again
  </a>

</body>
</html>
